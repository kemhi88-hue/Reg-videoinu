name: InVideo Auto Reg (Mail.tm)
on:
  workflow_dispatch: # Bấm nút trên GitHub để chạy

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Auto Registration
        run: python main.py
