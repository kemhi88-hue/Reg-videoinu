name: Videoinu Auto Reg
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install
        run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: Run
        run: python main.py
      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: videoinu-results
          path: |
            *.png
            accounts_videoinu.txt
